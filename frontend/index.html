<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solar Energy Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🌞 Solar Energy Dashboard</h1>

    <div class="inputs">
      <input type="number" id="solar" placeholder="Solar kWh">
      <input type="number" id="temp" placeholder="Temperature (°C)">
      <input type="number" id="sunlight" placeholder="Sunlight Hours">
      <button onclick="getPrediction()">Predict</button>
    </div>

    <div id="result"></div>

    <canvas id="chart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>

</body>
</html>
