<!DOCTYPE html>
<html>
<head>
  <title>Smart Energy Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>⚡ Smart Energy Management System</h1>

  <div class="card">
    <h3>☀️ Solar Input</h3>
    <input type="number" id="temp" placeholder="Temperature (°C)">
    <input type="number" id="sunlight" placeholder="Sunlight Hours">

    <select id="weather">
      <option value="">Select Weather</option>
      <option>Sunny</option>
      <option>Cloudy</option>
      <option>Rainy</option>
    </select>

    <h3>🏠 Appliances</h3>

    <div class="appliance">
      <input type="checkbox" id="fanCheck"> Fan
      <input type="number" id="fanCount" placeholder="No.">
      <input type="number" id="fanHours" placeholder="Hours">
    </div>

    <div class="appliance">
      <input type="checkbox" id="lightCheck"> Light
      <input type="number" id="lightCount" placeholder="No.">
      <input type="number" id="lightHours" placeholder="Hours">
    </div>

    <div class="appliance">
      <input type="checkbox" id="tvCheck"> TV
      <input type="number" id="tvCount" placeholder="No.">
      <input type="number" id="tvHours" placeholder="Hours">
    </div>

    <div class="appliance">
      <input type="checkbox" id="fridgeCheck"> Fridge
      <input type="number" id="fridgeCount" placeholder="No.">
      <input type="number" id="fridgeHours" placeholder="Hours">
    </div>

    <div class="appliance">
      <input type="checkbox" id="acCheck"> AC
      <input type="number" id="acCount" placeholder="No.">
      <input type="number" id="acHours" placeholder="Hours">
    </div>

    <div class="appliance">
      <input type="checkbox" id="geyserCheck"> Geyser
      <input type="number" id="geyserCount" placeholder="No.">
      <input type="number" id="geyserHours" placeholder="Hours">
    </div>

    <button onclick="getPrediction()">Calculate</button>
  </div>

  <div id="result" class="card"></div>
  <div id="suggestion" class="card"></div>

  <h3>📊 Daily Analysis</h3>
  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
