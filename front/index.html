<!DOCTYPE html>
<html>
<head>
  <title>Smart Solar Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>⚡ Smart Solar Power Management</h1>

  <div class="card">
    <input type="number" id="temp" placeholder="Temperature (°C)">
    <input type="number" id="sunlight" placeholder="Sunlight Hours">

    <select id="weather">
      <option value="">Select Weather</option>
      <option>Sunny</option>
      <option>Cloudy</option>
      <option>Rainy</option>
    </select>

    <button onclick="getPrediction()">Predict</button>
  </div>

  <div id="result" class="card"></div>
  <div id="suggestion" class="card"></div>

  <h3>📊 Daily Analysis</h3>
  <canvas id="chart"></canvas>

  <h3>📈 Yearly Analysis</h3>
  <canvas id="yearChart"></canvas>

  <div id="monthly" class="card"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
